<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>King Library Selfie Demo</title>
    <meta
      name="description"
      content="GitHub Pages-ready camera selfie demo for iframe embedding."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Recommended iframe embed:
      <iframe
        src="https://YOUR_GITHUB_USERNAME.github.io/sammy-parkinggarage/"
        title="King Library Selfie Demo"
        width="100%"
        height="760"
        style="border:0;max-width:460px"
        allow="camera; clipboard-write; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
      ></iframe>
    -->
    <main class="app" aria-live="polite">
      <section class="billboard" aria-label="Campaign message">
        <p id="billboardMessage"></p>
      </section>

      <section class="camera-card" aria-label="Selfie experience">
        <div class="camera-header">
          <h1 class="title">Selfie with Sammy</h1>
          <a
            id="openFullScreenLink"
            class="text-link"
            target="_blank"
            rel="noopener noreferrer"
            >Open full screen</a
          >
        </div>

        <p class="helper" id="helperText"></p>

        <div class="mode-switch" role="group" aria-label="Experience mode">
          <button id="modeSelfieBtn" class="mode-btn active" type="button" aria-pressed="true">
            Selfie mode
          </button>
          <button id="modeArBtn" class="mode-btn" type="button" aria-pressed="false">
            AR mode (beta)
          </button>
        </div>

        <div class="camera-stage" id="cameraStage">
          <video
            id="cameraVideo"
            playsinline
            autoplay
            muted
            aria-label="Live front camera preview"
          ></video>
          <canvas id="cameraComposite" aria-hidden="true"></canvas>

          <div class="overlay" id="liveOverlay" aria-hidden="true">
            <img
              id="frameAssetLive"
              class="frame-asset-live"
              alt=""
              aria-hidden="true"
            />
            <div class="banner top" id="topBanner">
              <span class="logo" id="logoTop"></span>
              <span class="campaign-text" id="insideFrameMessageTop"></span>
            </div>

            <div class="sammy-wrap" id="sammyWrap">
              <img id="sammyImageLive" class="sammy-image-live" alt="" aria-hidden="true" />
              <img
                id="sammyLive"
                src="assets/SammyTheSpartan.png"
                alt="Sammy the Spartan mascot"
              />
            </div>

            <div class="banner bottom" id="bottomBanner">
              <span class="logo" id="logoBottom"></span>
              <span class="campaign-text" id="insideFrameMessageBottom"></span>
            </div>
          </div>

          <div class="stage-state" id="stageState" role="status" hidden></div>
        </div>

        <div class="frame-picker" id="framePicker" role="group" aria-label="Choose a frame"></div>

        <div class="actions">
          <button id="flipBtn" class="btn btn-secondary" type="button">
            Flip camera
          </button>
          <button id="captureBtn" class="btn btn-primary" type="button">
            Capture
          </button>
          <button id="shareBtn" class="btn btn-secondary" type="button" disabled>
            Share
          </button>
          <a id="downloadLink" class="btn btn-secondary disabled" download>
            Download PNG
          </a>
          <button id="calibrateBtn" class="btn btn-secondary" type="button" aria-expanded="false">
            Adjust Sammy
          </button>
        </div>

        <section
          class="sammy-calibration"
          id="sammyCalibration"
          hidden
          aria-label="Sammy position calibration"
        >
          <h2 class="subheading">Sammy placement</h2>
          <label for="sammyXRange">Horizontal</label>
          <input id="sammyXRange" type="range" min="0.05" max="0.95" step="0.01" />
          <label for="sammyYRange">Vertical</label>
          <input id="sammyYRange" type="range" min="0.1" max="0.95" step="0.01" />
          <label for="sammyScaleRange">Scale</label>
          <input id="sammyScaleRange" type="range" min="0.12" max="0.62" step="0.01" />
          <button id="resetSammyBtn" class="btn btn-secondary" type="button">Reset placement</button>
          <p class="helper calibration-note" id="sammyCalibrationReadout"></p>
        </section>
      </section>

      <section class="preview-card" id="previewCard" hidden aria-label="Captured preview">
        <h2>Preview</h2>
        <img id="previewImage" alt="Captured selfie preview" />
      </section>
    </main>

    <dialog id="shareModal" aria-labelledby="shareModalTitle">
      <h2 id="shareModalTitle">Share options</h2>
      <p id="shareModalMessage"></p>
      <div class="modal-actions">
        <button id="copyCaptionBtn" class="btn btn-primary" type="button">
          Copy caption
        </button>
        <button id="closeModalBtn" class="btn btn-secondary" type="button">
          Close
        </button>
      </div>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script src="script.js"></script>

    <!--
      README (quick setup for GitHub Pages):
      1) Commit index.html, styles.css, script.js to your repository root.
      2) In GitHub: Settings -> Pages -> Source: Deploy from a branch.
      3) Select branch "main" and folder "/ (root)", then Save.
      4) Open the published https://<user>.github.io/<repo>/ URL over HTTPS.
      5) If embedding in another site, ensure iframe has allow="camera; clipboard-write; web-share".
      6) QA matrix quick list: iOS Safari, Android Chrome, iframe + full-screen fallback, denied-permission state.
    -->
  </body>
</html>
